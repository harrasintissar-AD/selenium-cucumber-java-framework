name: Selenium Automation Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  automation-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify Docker installation
        run: docker --version

      - name: Start ParaBank container
        run: |
          docker run -d \
          --name Parabank \
          -p 8080:8080 \
          parasoft/parabank:latest

      - name: Wait for ParaBank application
        run: |
          echo "Waiting for ParaBank to start..."
          timeout 60 bash -c 'until curl -s http://localhost:8080/parabank/index.htm > /dev/null; do sleep 5; done'

      - name: Run Selenium tests
        run: mvn clean test

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/screenshots/

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-report
          path: target/
