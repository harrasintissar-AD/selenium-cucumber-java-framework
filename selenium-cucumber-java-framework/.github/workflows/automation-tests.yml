name: Selenium Cucumber CI Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        default: 'qa'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print workspace path
        run: echo $GITHUB_WORKSPACE

      - name: Show full folder structure
        run: |
          ls
          ls -R $GITHUB_WORKSPACE

      - name: Find pom.xml
        run: find $GITHUB_WORKSPACE -name pom.xml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # -----------------------------
      # Docker / ParaBank Setup
      # -----------------------------

      - name: Verify Docker installation
        run: docker --version

      - name: Pull ParaBank image
        run: docker pull parasoft/parabank:latest

      - name: Start ParaBank container
        run: |
          docker run -d \
            --name Parabank \
            -p 8080:8080 \
            parasoft/parabank:latest

      - name: Verify running container
        run: docker ps

      - name: Wait for ParaBank application
        run: |
          echo "Waiting for ParaBank to start..."

          timeout 90 bash -c '
          until curl -s http://localhost:8080/parabank/index.htm > /dev/null;
          do
            echo "Waiting..."
            sleep 5
          done
          '

          echo "ParaBank is ready"

      # -----------------------------
      # Run Selenium Tests
      # -----------------------------

      - name: Build and run tests
        run: mvn clean test -f $GITHUB_WORKSPACE/selenium-cucumber-java-framework/pom.xml

      # -----------------------------
      # Debugging
      # -----------------------------

      - name: Debug report generation
        if: always()
        run: |
          echo "Workspace:"
          pwd
          echo "Full Structure:"
          find . -type d -name "execution-report"
          find . -type d -name "screenshots"
          find . -type d -name "test-output"
          ls -R

      - name: Show Docker logs
        if: always()
        run: docker logs Parabank

      # -----------------------------
      # Reports
      # -----------------------------

		- name: Upload Execution Report
		  uses: actions/upload-artifact@v4
		  if: always()
		  with:
		    name: execution-report
		    path: ${{ github.workspace }}/selenium-cucumber-java-framework/target/

      # -----------------------------
      # Cleanup
      # -----------------------------

      - name: Stop Docker container
        if: always()
        run: |
          docker stop Parabank
          docker rm Parabank