name: Selenium Cucumber CI Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:
      inputs:
        environment:
          description: 'Test environment'
          required: true
          default: 'qa'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print workspace path
        run: echo $GITHUB_WORKSPACE

      - name: Show full folder structure
        run: |
         ls
         ls -R $GITHUB_WORKSPACE

      - name: Find pom.xml
        run: find $GITHUB_WORKSPACE -name pom.xml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build and run tests
        run: mvn clean test -f $GITHUB_WORKSPACE/selenium-cucumber-java-framework/pom.xml

	  - name: Debug report generation
        if: always()
        run: |
          echo "Workspace:"
          pwd
          echo "Full structure:"
          find . -type d -name "execution-report"
          find . -type d -name "target"
          ls -R
		
	  - name: Upload Execution Report
	    uses: actions/upload-artifact@v4
	    if: always()
	    with:
	      name: execution-report
	      path: $GITHUB_WORKSPACE/selenium-cucumber-java-framework/target/execution-report/

	  - name: Upload Screenshots
	    uses: actions/upload-artifact@v4
	    if: always()
	    with:
	      name: screenshots
	      path: $GITHUB_WORKSPACE/selenium-cucumber-java-framework/screenshots/

	  - name: Upload TestNG Report
	    uses: actions/upload-artifact@v4
	    if: always()
	    with:
	      name: test-output
	      path: $GITHUB_WORKSPACE/selenium-cucumber-java-framework/test-output/
